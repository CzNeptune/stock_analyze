<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI评股</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            padding: 20px;
            font-family: system-ui, sans-serif;
        }
        /* 搜索栏 */
        .search-bar {
            display: flex;
            gap: 10px;
            max-width: 900px;
            margin: 0 auto 20px;
            position: relative;
        }
        .radio-group {
            display: flex;
            gap: 12px;
            white-space: nowrap;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        #keyword {
            flex: 1;
            padding: 10px 14px;
            font-size: 16px;
            border: 1px solid #dcdcdc;
            border-radius: 4px;
        }
        #keyword:focus {
            outline: none;
            border-color: #1890ff;
        }
        #searchBtn {
            padding: 0 20px;
            background: #1890ff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #searchBtn:hover {
            background: #097dd6;
        }

        /* 自动补全下拉列表 */
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #dcdcdc;
            border-top: none;
            border-radius: 0 0 4px 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .autocomplete-item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        .autocomplete-item:hover,
        .autocomplete-item.highlighted {
            background-color: #f0f7ff;
        }
        .autocomplete-item .code {
            color: #999;
            font-size: 14px;
        }
        .autocomplete-item .name {
            font-weight: bold;
        }
        .autocomplete-item .type {
            color: #666;
            font-size: 12px;
        }

        /* Tab标签栏 */
        .tabs-wrap {
            display: flex;
            border-bottom: 1px solid #e8e8e8;
            margin-bottom: 10px;
            overflow-x: auto;
        }
        .tab-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid #e8e8e8;
            border-bottom: none;
            margin-right: 6px;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            background: #fafafa;
        }
        .tab-item.active {
            background: #fff;
            top: 1px;
            position: relative;
        }
        .tab-close {
            width: 16px;
            height: 16px;
            line-height: 16px;
            text-align: center;
            border-radius: 50%;
            font-size: 12px;
            color: #999;
        }
        .tab-close:hover {
            background: #ddd;
            color: #333;
        }

        /* iframe容器 */
        .iframe-container {
            width: 100%;
            min-height: 850px;
            border: 1px solid #eee;
        }
        .empty-tip {
            height: 850px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 15px;
        }
        iframe {
            width: 100%;
            height: 850px;
            border: none;
            display: none;
        }
        iframe.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 搜索区域 -->
    <div class="search-bar">
        <div class="radio-group">
            <div class="radio-item">
                <input type="radio" name="searchType" id="typeReport" value="report" checked>
                <label for="typeReport">财报</label>
            </div>
            <div class="radio-item">
                <input type="radio" name="searchType" id="typeExpect" value="expect">
                <label for="typeExpect">预期</label>
            </div>
            <div class="radio-item">
                <input type="radio" name="searchType" id="typeQuant" value="quant">
                <label for="typeQuant">量化</label>
            </div>
        </div>

        <div style="position: relative; flex: 1;">
            <input type="text" id="keyword" placeholder="请输入股票代码或名称">
            <div class="autocomplete-list" id="autocompleteList"></div>
        </div>
        <button id="searchBtn">查询</button>
    </div>

    <!-- Tab标签栏 -->
    <div class="tabs-wrap" id="tabsBox"></div>

    <!-- 页面iframe容器 -->
    <div class="iframe-container" id="iframeBox">
        <div class="empty-tip">搜索关键词显示结果</div>
    </div>

    <script>
        const keywordEl = document.getElementById('keyword');
        const searchBtn = document.getElementById('searchBtn');
        const tabsBox = document.getElementById('tabsBox');
        const iframeBox = document.getElementById('iframeBox');
        const autocompleteList = document.getElementById('autocompleteList');
        
        // 获取所有单选框
        const typeRadios = document.querySelectorAll('input[name="searchType"]');

        // 存储所有标签数据 { id, title, url }
        let tabList = [];
        let activeTabId = null;
        let tabIdCounter = 0;
        
        // 自动补全相关变量
        let currentSuggestions = [];
        let highlightedIndex = -1;
        let debounceTimer = null;

        // 获取当前选中的类型
        function getSelectedType() {
            for (const radio of typeRadios) {
                if (radio.checked) return radio.value;
            }
            return "report";
        }
        
        // 搜索请求接口
        async function searchHandle() {
            const keyword = keywordEl.value.trim();
            const searchType = getSelectedType();
            if (!keyword) {
                alert('请输入关键词');
                return;
            }
            try {
                // 请求后端接口，返回 { pageUrl: "xxx.html", title: "页面标题" }
                const res = await fetch(`/stock/api/v1/search?keyword=${encodeURIComponent(keyword)}&searchType=${encodeURIComponent(searchType)}`);
                if (!res.ok) throw new Error('接口异常');
                const data = await res.json();
                const pageUrl = data.pageUrl;
                const pageTitle = data.title || keyword;

                if (!pageUrl) {
                    alert('未查询到结果');
                    return;
                }

                // 判断该url是否已存在tab，存在直接切换
                const existTab = tabList.find(t => t.url === pageUrl);
                if (existTab) {
                    switchTab(existTab.id);
                    return;
                }

                // 创建新tab
                createNewTab(pageTitle, pageUrl);
                
                // 清空自动补全列表
                hideAutocomplete();
            } catch (err) {
                console.error(err);
                alert('获取页面地址失败：' + err.message);
            }
        }

        // 创建Tab + iframe
        function createNewTab(title, url) {
            tabIdCounter++;
            const tabId = tabIdCounter;
            tabList.push({ id: tabId, title, url });

            // 生成Tab标签DOM
            const tabDom = document.createElement('div');
            tabDom.className = 'tab-item';
            tabDom.dataset.id = tabId;
            tabDom.innerHTML = `
                <span class="tab-name">${title}</span>
                <span class="tab-close" data-id="${tabId}">×</span>
            `;
            tabsBox.appendChild(tabDom);

            // 生成iframe
            const iframe = document.createElement('iframe');
            iframe.dataset.id = tabId;
            iframe.src = url;
            iframeBox.appendChild(iframe);

            // 切换到新标签
            switchTab(tabId);

            // 标签点击切换
            tabDom.addEventListener('click', (e) => {
                if (!e.target.classList.contains('tab-close')) {
                    switchTab(tabId);
                }
            });

            // 关闭按钮
            tabDom.querySelector('.tab-close').addEventListener('click', (e) => {
                e.stopPropagation();
                closeTab(tabId);
            });
        }

        // 切换标签
        function switchTab(tabId) {
            activeTabId = tabId;
            // 更新tab激活样式
            document.querySelectorAll('.tab-item').forEach(t => {
                t.classList.toggle('active', Number(t.dataset.id) === tabId);
            });
            // 显示对应iframe，隐藏其他
            document.querySelectorAll('iframe').forEach(iframe => {
                iframe.classList.toggle('active', Number(iframe.dataset.id) === tabId);
            });
            // 移除空提示
            document.querySelector('.empty-tip')?.remove();
        }

        // 关闭标签
        function closeTab(tabId) {
            // 删除数据
            tabList = tabList.filter(t => t.id !== tabId);
            // 删除tab DOM
            document.querySelector(`.tab-item[data-id="${tabId}"]`)?.remove();
            // 删除iframe
            document.querySelector(`iframe[data-id="${tabId}"]`)?.remove();

            // 如果关闭的是当前激活tab
            if (activeTabId === tabId) {
                if (tabList.length > 0) {
                    // 切换到最后一个标签
                    switchTab(tabList[tabList.length - 1].id);
                } else {
                    // 无标签，恢复空提示
                    activeTabId = null;
                    iframeBox.innerHTML = `<div class="empty-tip">暂无页面，搜索关键词创建标签</div>`;
                }
            }
        }

        // 显示自动补全列表
        function showAutocomplete(suggestions) {
            currentSuggestions = suggestions;
            autocompleteList.innerHTML = '';
            
            if (suggestions.length === 0) {
                autocompleteList.style.display = 'none';
                return;
            }
            
            suggestions.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'autocomplete-item';
                itemEl.dataset.index = index;
                itemEl.innerHTML = `
                    <div><span class="name">${item.name}</span> <span class="code">${item.code}</span></div>
                    <div class="type">${item.type}</div>
                `;
                
                itemEl.addEventListener('click', () => {
                    selectSuggestion(index);
                });
                
                autocompleteList.appendChild(itemEl);
            });
            
            autocompleteList.style.display = 'block';
            highlightedIndex = -1;
        }

        // 隐藏自动补全列表
        function hideAutocomplete() {
            autocompleteList.style.display = 'none';
            highlightedIndex = -1;
        }

        // 选择建议项
        function selectSuggestion(index) {
            if (index >= 0 && index < currentSuggestions.length) {
                const suggestion = currentSuggestions[index];
                keywordEl.value = suggestion.code; // 填入股票代码
                hideAutocomplete();
            }
        }

        // 高亮指定索引的项目
        function highlightItem(index) {
            const items = autocompleteList.querySelectorAll('.autocomplete-item');
            items.forEach((item, i) => {
                item.classList.toggle('highlighted', i === index);
            });
            highlightedIndex = index;
        }

        // 键盘导航
        function handleKeyDown(e) {
            if (autocompleteList.style.display === 'none' || currentSuggestions.length === 0) {
                return;
            }

            switch (e.key) {
                case 'ArrowDown':
                    e.preventDefault();
                    const nextIndex = (highlightedIndex + 1) % currentSuggestions.length;
                    highlightItem(nextIndex);
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    const prevIndex = highlightedIndex <= 0 ? currentSuggestions.length - 1 : highlightedIndex - 1;
                    highlightItem(prevIndex);
                    break;
                case 'Enter':
                    e.preventDefault();
                    if (highlightedIndex >= 0) {
                        selectSuggestion(highlightedIndex);
                    } else {
                        searchHandle(); // 如果没有高亮项，则执行搜索
                    }
                    break;
                case 'Escape':
                    hideAutocomplete();
                    break;
            }
        }

        // 监听输入变化，触发自动补全（防抖处理）
        keywordEl.addEventListener('input', (e) => {
            const value = e.target.value.trim();
            
            // 清除之前的定时器
            if (debounceTimer) {
                clearTimeout(debounceTimer);
            }
            
            if (value.length > 0) {
                // 设置新的定时器，延迟300ms发起请求
                debounceTimer = setTimeout(async () => {
                    try {
                        // 调用后端接口获取股票代码建议
                        const response = await fetch(`/stock/api/v1/get_code?name=${encodeURIComponent(value)}`);
                        if (response.ok) {
                            const data = await response.json();
                            showAutocomplete(data.infos || []);
                        } else {
                            showAutocomplete([]);
                        }
                    } catch (error) {
                        console.error('获取股票代码建议失败:', error);
                        showAutocomplete([]);
                    }
                }, 300);
            } else {
                hideAutocomplete();
            }
        });

        // 点击外部区域隐藏自动补全列表
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-bar')) {
                hideAutocomplete();
            }
        });

        // 绑定事件
        searchBtn.addEventListener('click', searchHandle);
        keywordEl.addEventListener('keydown', handleKeyDown);
        keywordEl.addEventListener('keydown', e => {
            if (e.key === 'Enter' && highlightedIndex < 0) {
                e.preventDefault(); // 防止在有高亮项时触发搜索
                searchHandle();
            }
        });
    </script>
</body>
</html>
